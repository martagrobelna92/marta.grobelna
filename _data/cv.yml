    Publications:
      - title: "Stopping Criteria for Value Iteration on Concurrent Stochastic Reachability and Safety Games"
        authors:
          - Marta Grobelna, Jan Kretinsky, and Maximilian Weininger
        conference: LICS 2025
        url: https://arxiv.org/pdf/2505.21087?
        summary: It concerned an interpretation of the Michelson–Morley experiment and the properties of light and time. Special relativity incorporates the principle that the speed of light is the same for all inertial observers regardless of the state of motion of the source.

      - title: Über einen die Erzeugung und Verwandlung des Lichtes betreffenden heuristischen Gesichtspunkt
        authors:
          - Albert Einstein
        publisher: Annalen der Physik
        releaseDate: 1905-03-18
        url: https://de.wikisource.org/wiki/Über_einen_die_Erzeugung_und_Verwandlung_des_Lichtes_betreffenden_heuristischen_Gesichtspunkt
        summary: In the second paper, we consider two-player zero-sum concurrent stochastic games (CSGs) played on graphs with reachability and safety
          objectives. These include degenerate classes such as Markov
          decision processes or turn-based stochastic games, which can be
          solved by linear or quadratic programming; however, in practice,
          value iteration (VI) outperforms the other approaches and is the
          most implemented method. Similarly, for CSGs, this practical
          performance makes VI an attractive alternative to the standard
          theoretical solution via the existential theory of reals.
          VI starts with an under-approximation of the sought values for
          each state and iteratively updates them, traditionally terminating
          once two consecutive approximations are ϵ-close. However, this
          stopping criterion lacks guarantees on the precision of the
          approximation, which is the goal of this work. We provide bounded
          (a.k.a. interval) VI for CSGs: it complements standard VI with a
          converging sequence of over-approximations and terminates once
          the over- and under-approximations are ϵ-close.



